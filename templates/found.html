<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Found ID - MUT ID Tracker</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    {% include 'navbar.html' %}

    <div class="container">
      <div class="page-header">
        <h2>Report a Found Student ID</h2>
        <a href="/" class="back-link">&larr; Back to Home</a>
      </div>

      <div class="form-card">
        <p class="form-instruction">
          Thank you for being a good comrade! Please tell us where you found the
          ID and upload a clear picture of it. We will handle the rest.
        </p>

        <form action="/found" method="POST" enctype="multipart/form-data">
          <div class="form-group">
            <label for="location">Location Found</label>
            <input
              type="text"
              id="location"
              name="location"
              list="loc_suggestions"
              placeholder="e.g. Tuition Block"
              required
            />
            <datalist id="loc_suggestions">
              <option value="Main Gate"></option>
              <option value="Small Gate"></option>
              <option value="Tuition Block"></option>
              <option value="Hostels"></option>
              <option value="Playing Field"></option>
              <option value="Science Complex"></option>
              <option value="Administration Block"></option>
            </datalist>
          </div>

          <div class="form-group">
            <label for="id_image"
              >Upload a Selfie or ID Photo (Clear Image)</label
            >
            <input
              type="file"
              id="id_image"
              name="id_image"
              accept="image/*"
              class="file-input"
              required
            />
            <small>Supported formats: JPG, PNG, JPEG</small>
          </div>

          <button
            type="submit"
            class="submit-btn has-spinner"
            data-loading-text="Uploading... Please Wait"
          >
            <span class="btn-text">Submit Found ID</span>
            <span class="spinner" style="display: none"></span>
          </button>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>

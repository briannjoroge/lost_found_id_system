<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Found ID</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    {% include 'navbar.html' %}

    <hr />

    <h2>Report Found Student ID</h2>

    <form action="/found" method="POST" enctype="multipart/form-data">
      <label>Location Found:</label><br />
      <input type="text" name="location" required /><br /><br />

      <label>Upload ID Image:</label><br />
      <input
        type="file"
        name="id_image"
        accept="image/*"
        required
      /><br /><br />

      <button type="submit">Submit Found ID</button>
    </form>
  </body>
</html>

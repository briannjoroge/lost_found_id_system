<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MUT ID Tracker</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    {% include 'navbar.html' %}

    <div class="container">
      <div class="page-header">
        <h2>Student Login</h2>
      </div>

      <div class="form-card">
        <form action="/login" method="POST">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              name="email"
              class="text-input"
              placeholder="e.g. jane@student.mut.ac.ke"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-container">
              <input
                type="password"
                id="loginPassword"
                name="password"
                class="text-input"
                placeholder="******"
                required
              />
              <span
                class="toggle-password"
                onclick="togglePassword('loginPassword', this)"
                >👁️</span
              >
            </div>
          </div>

          <button type="submit" class="submit-btn">Login</button>

          <div style="margin-top: 15px; text-align: center">
            <p>
              New here?
              <a href="/register" style="color: #2c3e50; font-weight: bold"
                >Create an account</a
              >
            </p>
          </div>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Lost ID - MUT ID Tracker</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    {% include 'navbar.html' %}

    <div class="container">
      <div class="page-header">
        <h2>Report a Lost Student ID</h2>
        <a href="/" class="back-link">&larr; Back to Home</a>
      </div>

      <div class="form-card">
        <p class="form-instruction">
          Enter the details of the student whose ID is lost. This will help us
          match it if someone finds it.
        </p>

        <form action="/lost" method="POST" enctype="multipart/form-data">
          <div class="form-group">
            <label for="student_name">Student Name</label>
            <input
              type="text"
              id="student_name"
              name="student_name"
              placeholder="e.g. John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label for="reg_number">Registration Number</label>
            <input
              type="text"
              id="reg_number"
              name="reg_number"
              placeholder="e.g. SC200/0000/2021"
              required
            />
          </div>

          <div class="form-group">
            <label for="department">Department</label>
            <input
              type="text"
              id="department"
              name="department"
              list="dept_suggestions"
              placeholder="e.g. Computer Science"
              required
            />
            <datalist id="dept_suggestions">
              <option value="Computer Science"></option>
              <option value="Business"></option>
              <option value="Education"></option>
              <option value="Engineering"></option>
              <option value="Pure & Applied Sciences"></option>
              <option value="Health Sciences"></option>
            </datalist>
          </div>

          <div class="form-group">
            <label for="id_image">Upload ID Photo (Clear Image)</label>
            <input
              type="file"
              id="id_image"
              name="id_image"
              accept="image/*"
              class="file-input"
              required
            />
            <small>Supported formats: JPG, PNG, JPEG</small>
          </div>

          <button type="submit" class="submit-btn">Submit Report</button>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
